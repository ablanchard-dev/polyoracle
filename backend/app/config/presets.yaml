# PolyOracle CapitalAllocator presets — single engine, capital-aware sliding scale.
#
# v0.7.2: removed all named "modes" (SAFE / AGGRESSIVE / FULL_MIRROR / FULL_PAPER).
# The bot has ONE operational mode: the CapitalAllocator with capital-aware
# tightening. The operator configures their CAPITAL only; selectivity adapts
# automatically:
#
#   ≤ 50€        → ELITE only, EV_lb ≥ 0.10, max 5 positions
#   100-500€     → ELITE+top STRONG, EV_lb ≥ 0.05, max 15 positions
#   500-1000€    → standard, EV_lb ≥ 0.03
#   1000-5000€   → FULL utility, base preset gate
#   5000€+       → permissive, no position cap
#
# Two presets only:
#   BASE_PAPER — paper trading (live_allowed=false, EV_lb gate 0.02 since fees aren't realised)
#   BASE_LIVE  — live execution (live_allowed=true,  EV_lb gate 0.05 to cover taker fees)
#
# Convention: every percentage is a fraction (0.95 = 95%).

BASE_PAPER:
  description: |
    Capital-aware paper preset. The CapitalAllocator's sliding scale tightens
    thresholds when capital is small. Paper gate keeps EV_lb >= 0.02 since
    fees aren't realised in paper.
  # Hard exposure (fractions of capital_total)
  max_total_exposure: 0.95
  max_open_positions: null
  reserve_buffer: 0.05
  # Sizing
  risk_per_trade: 0.01
  min_stake: 5.0
  # Quality gates
  allowed_tiers: ["ELITE", "STRONG"]
  min_ev_lb: 0.02
  min_copyable_edge: 0.15         # v0.7.2 B3 — was 0.40 (median observed 0.20). 0.15 unlocks paper.
  max_spread_pct: 0.04
  min_liquidity: 1000             # legacy USD notional (kept for back-compat)
  min_liquidity_score: 30         # v0.7.2 B1 — preferred 0-100 score gate (paper)
  # Fees model
  polymarket_fee_pct: 0.04
  min_edge_after_fees: 0.01
  # Late entry by category (seconds since wallet entry); default applies if signal lacks category
  late_entry_thresholds:
    crypto_5min: 60
    political: 600
    sport: 300
    macro: 900
  late_entry_default: 300
  # Per-wallet / per-market exposure caps
  max_wallet_exposure: 0.10
  max_market_exposure: 0.05
  # Misc
  require_orderbook_quality: true
  live_allowed: false
  capital_aware_thresholds: true

BASE_LIVE:
  description: |
    Capital-aware live preset. Stricter EV gate (covers ~4% taker fee + 1% buffer).
    Hard safety caps complement the soft preset rules (drawdown auto-kill,
    weekly-loss kill switch). When capital_total ≤ 50, sliding scale auto-
    tightens to ELITE-only, EV_lb ≥ 0.10, max 5 positions.
  max_total_exposure: 0.70
  max_open_positions: 100
  reserve_buffer: 0.20
  risk_per_trade: 0.01
  min_stake: 5.0
  allowed_tiers: ["ELITE", "STRONG"]
  min_ev_lb: 0.05
  min_copyable_edge: 0.25         # v0.7.2 B3 — was 0.50. Live keeps a stricter buffer than paper.
  max_spread_pct: 0.03
  min_liquidity: 5000             # legacy USD notional (kept for back-compat)
  min_liquidity_score: 50         # v0.7.2 B1 — stricter 0-100 score gate (live)
  polymarket_fee_pct: 0.04
  min_edge_after_fees: 0.01
  late_entry_thresholds:
    crypto_5min: 30
    political: 300
    sport: 150
    macro: 600
  late_entry_default: 180
  max_wallet_exposure: 0.07
  max_market_exposure: 0.04
  require_orderbook_quality: true
  live_allowed: true
  capital_aware_thresholds: true
  hard_safety_caps:
    max_capital_at_risk_one_trade: 0.03
    auto_kill_on_drawdown: 0.15
    auto_kill_on_weekly_loss: 0.10
